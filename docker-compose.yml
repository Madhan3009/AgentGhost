version: '3.8'

# Ghost Requirement Agent — Docker Compose
# Development environment: PostgreSQL 16 + pgvector, Redis 7
#
# Usage:
#   docker compose up -d        # Start services
#   docker compose down         # Stop services
#   docker compose logs -f      # View logs

services:

  # ──────────────────────────────────────────────────────────────
  # PostgreSQL 16 + pgvector extension
  # Port: 5433 (host) → 5432 (container)
  # ──────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ghost-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ghost
      POSTGRES_PASSWORD: ghostpassword
      POSTGRES_DB: ghost_poc
    volumes:
      - ghost_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghost -d ghost_poc"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # Redis 7 (Celery broker + result backend)
  # Port: 6380 (host) → 6379 (container)
  # ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ghost-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ghost_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # Prometheus (metrics scraping)
  # Port: 9090 (host) → 9090 (container)
  # Scrapes: Ghost FastAPI /metrics endpoint every 10s
  # ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ghost-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ghost_prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    extra_hosts:
      # Allow Prometheus to reach the host machine where FastAPI runs in dev
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────────────────────
  # Grafana (dashboard + visualization)
  # Port: 3001 (host) → 3000 (container)
  # Default login: admin / ghostadmin
  # Pre-provisioned with Ghost pipeline dashboard
  # ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: ghost-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ghostadmin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/ghost_dashboard.json
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - ghost_grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────────────────────
  # HashiCorp Vault (dev server — secret management)
  # Port: 8200 (host) → 8200 (container)
  # Root token: root  (dev only — never use in production)
  #
  # To enable:
  #   VAULT_ENABLED=true VAULT_ADDR=http://localhost:8200 VAULT_TOKEN=root
  #
  # Secrets are seeded by running:  make seed-vault
  # ──────────────────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.16
    container_name: ghost-vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_LOG_LEVEL: warn
    cap_add:
      - IPC_LOCK           # Required by Vault to lock memory pages (prevents swapping secrets)
    volumes:
      - ghost_vault_data:/vault/file
    command: ["vault", "server", "-dev"]
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ──────────────────────────────────────────────────────────────
  # Slack Socket Mode Listener (real-time message ingestion)
  # Connects to Slack via persistent WebSocket (no public URL needed).
  # Requires: SLACK_BOT_TOKEN and SLACK_APP_TOKEN in .env
  #
  # To start standalone (without Docker):  make slack-listener
  # ──────────────────────────────────────────────────────────────
  slack-listener:
    image: python:3.11-slim
    container_name: ghost-slack-listener
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      # Override DB/Redis URLs to reach other containers (not localhost)
      DATABASE_URL: postgresql://ghost:ghostpassword@postgres:5432/ghost_poc
      REDIS_URL: redis://redis:6379/0
    command: sh -c "pip install -q slack-bolt slack-sdk celery[redis] psycopg2-binary python-dotenv google-genai agno prometheus-client && python -m agents.slack_listener"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import slack_bolt; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ghost_pgdata:
    name: ghost_pgdata
  ghost_redis_data:
    name: ghost_redis_data
  ghost_prometheus_data:
    name: ghost_prometheus_data
  ghost_grafana_data:
    name: ghost_grafana_data
  ghost_vault_data:
    name: ghost_vault_data
